<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claire — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #16242F; color: #E8E0D5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #1E3040; border-bottom: 1px solid #2A4060; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .back-link { color: #C9A882; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { text-decoration: underline; }
    .header-info { flex: 1; }
    .header-name { font-size: 1.1rem; font-weight: 600; color: #C9A882; }
    .header-id { font-size: 0.8rem; color: #8A9BA8; margin-top: 2px; }
    .thread { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
    .msg-member { background: #2A4060; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-claire { background: #C9A882; color: #16242F; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-label { font-size: 0.75rem; color: #8A9BA8; margin-bottom: 4px; }
    .msg-claire .msg-label { color: #7A6A50; }
    .typing { color: #8A9BA8; font-style: italic; font-size: 0.9rem; align-self: flex-end; }
    .input-row { background: #1E3040; border-top: 1px solid #2A4060; padding: 16px 24px; display: flex; gap: 12px; }
    .input-row input { flex: 1; background: #16242F; border: 1px solid #2A4060; border-radius: 8px; padding: 12px 16px; color: #E8E0D5; font-size: 0.95rem; outline: none; }
    .input-row input:focus { border-color: #C9A882; }
    .input-row button { background: #C9A882; color: #16242F; border: none; border-radius: 8px; padding: 12px 20px; font-weight: 600; cursor: pointer; }
    .input-row button:hover { background: #D4B896; }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty { color: #8A9BA8; text-align: center; margin-top: 40px; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <a class="back-link" href="/memberchat">← Members</a>
    <div class="header-info">
      <div class="header-name" id="member-name">Loading...</div>
      <div class="header-id" id="member-id"></div>
    </div>
  </div>
  <div class="thread" id="thread">
    <div class="empty" id="empty-state">Send a message to start your conversation with Claire.</div>
  </div>
  <div class="input-row">
    <input type="text" id="msg-input" placeholder="Ask about your benefits, claims, or medications..." />
    <button id="send-btn">Send</button>
  </div>
  <script>
    const patientId = window.location.pathname.split('/').pop();
    let isWaiting = false;

    async function loadMember() {
      try {
        const res = await fetch(`/api/patient/${encodeURIComponent(patientId)}`);
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();
        document.getElementById('member-name').textContent = data.displayName;
        document.getElementById('member-id').textContent = `Member ID: ${data.memberId} · Plan: ${data.planName}`;
        document.title = `Claire — ${data.displayName}`;
      } catch {
        document.getElementById('member-name').textContent = 'Member not found';
      }
    }

    function addMessage(role, text) {
      const thread = document.getElementById('thread');
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'member' ? 'You' : 'Claire';
      const body = document.createElement('div');
      body.textContent = text;
      div.appendChild(label);
      div.appendChild(body);
      thread.appendChild(div);
      thread.scrollTop = thread.scrollHeight;
    }

    function showTyping() {
      const thread = document.getElementById('thread');
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing-indicator';
      typing.textContent = 'Claire is typing...';
      thread.appendChild(typing);
      thread.scrollTop = thread.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const btn = document.getElementById('send-btn');
      const text = input.value.trim();
      if (!text || isWaiting) return;
      isWaiting = true;
      btn.disabled = true;
      input.value = '';
      addMessage('member', text);
      showTyping();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, patientId }),
        });
        const data = await res.json();
        hideTyping();
        if (data.response) {
          addMessage('claire', data.response);
        } else {
          addMessage('claire', data.error ?? 'Something went wrong.');
        }
      } catch {
        hideTyping();
        addMessage('claire', 'Sorry, I had trouble connecting. Please try again.');
      } finally {
        isWaiting = false;
        btn.disabled = false;
        input.focus();
      }
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    loadMember();
  </script>
</body>
</html>
