<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claire · Private Member Services</title>
<meta name="ext-resource-dependency" content="assets/claire-mark.svg" data-resource-id="claireMark" />

    <rect x="400" y="384" width="160" height="18" rx="9" fill="#cdbfae" />
    <rect x="400" y="450" width="220" height="60" rx="14" fill="#16242F" />
    <circle cx="760" cy="500" r="74" fill="#129684" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root {
    /* Privacy / verified — teal stays semantic */
    --accent: #129684;
    --accent-strong: #0C7868;
    --accent-tint: #E3F4F0;
    --accent-ring: rgba(18, 150, 132, 0.22);

    /* Claire brand — warm clay */
    --brand: #C77B54;
    --brand-strong: #A85F3B;
    --brand-tint: #F6E7DC;
    --brand-ring: rgba(199, 123, 84, 0.24);

    /* Deep ink surfaces (warm-leaning slate) */
    --navy-900: #16242F;
    --navy-850: #1B2C39;
    --navy-800: #213545;
    --navy-700: #335067;
    --navy-500: #4C7088;

    --app-bg: #F1EAE1;
    --panel: #FFFFFF;
    --panel-2: #F8F2EB;
    --border: #EBE0D2;
    --border-strong: #DCCEBC;

    --ink: #2C2820;
    --ink-soft: #6B6256;
    --ink-faint: #9D9384;

    --bubble-in: #F0E8DC;
    --bubble-in-ink: #3A332A;

    --radius: 14px;
    --shadow-sm: 0 1px 2px rgba(13, 26, 48, 0.05);
    --shadow-md: 0 6px 20px rgba(13, 26, 48, 0.08);

    --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--app-bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { height: 100%; }

  /* ---------- App shell ---------- */
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    flex: 0 0 auto;
    height: 64px;
    background: var(--navy-900);
    color: #fff;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 22px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 5;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand .logo {
    width: 38px; height: 38px; display: grid; place-items: center; flex: 0 0 auto;
  }
  .brand .logo img { width: 38px; height: 38px; display: block; }
  .brand .logo-meta { display: flex; flex-direction: column; line-height: 1.12; }
  .brand .logo-name { font-weight: 700; font-size: 16px; letter-spacing: 0.2px; }
  .brand .logo-sub { font-size: 11px; color: #B6A290; letter-spacing: 0.3px; }

  .topbar-center { display: flex; align-items: center; gap: 10px; justify-self: center; white-space: nowrap; }
  .topbar-center .who { font-weight: 600; font-size: 14.5px; white-space: nowrap; }
  .verify-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(15, 158, 140, 0.16);
    border: 1px solid rgba(15, 158, 140, 0.45);
    color: #6FE6D2;
    font-size: 11.5px; font-weight: 600;
    padding: 4px 10px 4px 8px; border-radius: 999px;
    letter-spacing: 0.2px; white-space: nowrap;
  }
  .verify-pill svg { width: 13px; height: 13px; }

  .topbar-right { justify-self: end; display: flex; align-items: center; gap: 14px; }
  .session {
    text-align: right; line-height: 1.2;
  }
  .session .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #93826F; }
  .session .val { font-family: var(--font-mono); font-size: 12.5px; color: #D8CBBA; white-space: nowrap; }

  /* ---------- Sub-nav: session switcher ---------- */
  .subnav {
    flex: 0 0 auto;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 0 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 4;
  }
  .sw { position: relative; }
  .sw-btn {
    display: flex; align-items: center; gap: 11px;
    background: var(--panel-2); border: 1px solid var(--border-strong); border-radius: 11px;
    padding: 7px 12px 7px 8px; cursor: pointer; min-width: 312px;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    font-family: var(--font-sans);
  }
  .sw-btn:hover { border-color: var(--brand); background: #fff; }
  .sw-ava {
    width: 30px; height: 30px; border-radius: 8px; flex: 0 0 auto;
    display: grid; place-items: center; font-size: 11px; font-weight: 700; color: #fff;
    background: linear-gradient(150deg, var(--navy-700), var(--navy-850));
  }
  .sw-ava.list { width: 34px; height: 34px; background: linear-gradient(150deg, var(--brand), var(--brand-strong)); }
  .sw-meta { display: flex; flex-direction: column; line-height: 1.22; text-align: left; margin-right: auto; }
  .sw-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .sw-plan { font-size: 11px; color: var(--ink-faint); }
  .sw-chev { color: var(--ink-faint); display: grid; place-items: center; transition: transform 0.25s; }
  .sw-chev.up { transform: rotate(180deg); }
  .sw-chev svg { width: 16px; height: 16px; }

  .sw-pop {
    position: absolute; top: calc(100% + 8px); left: 0; width: 392px;
    background: var(--panel); border: 1px solid var(--border-strong); border-radius: 13px;
    box-shadow: var(--shadow-md); padding: 7px; z-index: 30;
    animation: pop 0.16s ease both;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .sw-pop-head { font-size: 10px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; color: var(--ink-faint); padding: 8px 10px 7px; }
  .sw-item {
    display: flex; align-items: center; gap: 11px; width: 100%;
    background: none; border: none; padding: 9px 10px; border-radius: 10px; cursor: pointer;
    text-align: left; transition: background 0.12s; font-family: var(--font-sans);
  }
  .sw-item:hover { background: var(--panel-2); }
  .sw-item.active { background: var(--brand-tint); }
  .sw-item-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1 1 auto; }
  .sw-item-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .sw-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .sw-item-time { font-size: 10.5px; color: var(--ink-faint); font-family: var(--font-mono); flex: 0 0 auto; }
  .sw-item-prev { font-size: 11.5px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sw-active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); flex: 0 0 auto; box-shadow: 0 0 0 3px var(--brand-ring); }

  .subnav-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-faint); padding-right: 4px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); animation: livepulse 2.2s infinite; }
  @keyframes livepulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ---------- Body grid ---------- */
  .body {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    gap: 13px;
    padding: 13px;
    overflow: hidden;
  }
  .top-row {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 332px minmax(0, 1fr);
    gap: 13px;
    min-height: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .panel-head {
    flex: 0 0 auto;
    padding: 15px 18px 13px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .panel-title { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; }
  .panel-title .eyebrow {
    display: block; font-size: 10px; font-weight: 600; letter-spacing: 1.3px;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 3px;
  }
  .panel-scroll { overflow-y: auto; flex: 1 1 auto; min-height: 0; }
  .panel-scroll::-webkit-scrollbar { width: 9px; }
  .panel-scroll::-webkit-scrollbar-thumb { background: #D5DCE8; border-radius: 99px; border: 2px solid var(--panel); }
  .panel-scroll::-webkit-scrollbar-thumb:hover { background: #C2CBDB; }

  /* ---------- Member card (left) ---------- */
  .mc-hero {
    padding: 20px 18px 18px;
    background: linear-gradient(165deg, var(--navy-850) 0%, var(--navy-900) 100%);
    color: #fff;
  }
  .mc-avatar {
    width: 52px; height: 52px; border-radius: 13px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    display: grid; place-items: center;
    font-size: 18px; font-weight: 600; color: #DCE6F5;
    margin-bottom: 13px;
  }
  .mc-name { font-size: 19px; font-weight: 700; letter-spacing: 0.1px; }
  .mc-sub { font-size: 12.5px; color: #9DB0CC; margin-top: 3px; font-family: var(--font-mono); }
  .mc-planchip {
    margin-top: 14px;
    display: inline-flex; flex-direction: column; gap: 2px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 12px; width: 100%;
  }
  .mc-planchip .pn { font-size: 13.5px; font-weight: 600; color: #EAF0FA; }
  .mc-planchip .pt {
    font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
  }

  .mc-fields { padding: 6px 18px 4px; }
  .mc-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
  }
  .mc-row:last-child { border-bottom: none; }
  .mc-row .k { font-size: 11.5px; color: var(--ink-faint); font-weight: 500; flex: 0 1 auto; }
  .mc-row .v { font-size: 13px; color: var(--ink); font-weight: 600; text-align: right; flex: 0 0 auto; white-space: nowrap; }
  .mc-row .v.mono { font-family: var(--font-mono); font-weight: 500; font-size: 12.5px; }

  .mc-meter { padding: 14px 18px; border-top: 1px solid var(--border); }
  .mc-meter + .mc-meter { border-top: 1px solid var(--border); }
  .meter-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 9px; }
  .meter-head .ml { font-size: 11.5px; color: var(--ink-soft); font-weight: 600; }
  .meter-head .mv { font-size: 12px; font-family: var(--font-mono); color: var(--ink); }
  .meter-head .mv b { color: var(--ink); font-weight: 600; }
  .meter-head .mv span { color: var(--ink-faint); }
  .track { height: 8px; border-radius: 99px; background: #E7ECF4; overflow: hidden; }
  .fill { height: 100%; border-radius: 99px; transition: width 0.9s cubic-bezier(.22,.61,.36,1); }
  .fill.navy { background: linear-gradient(90deg, var(--navy-700), var(--navy-500)); }
  .fill.accent { background: linear-gradient(90deg, var(--accent-strong), var(--accent)); }
  .meter-foot { margin-top: 7px; font-size: 11px; color: var(--ink-faint); }

  /* ---------- Conversation (center) ---------- */
  .conv { background: var(--panel-2); }
  .thread {
    padding: 22px 26px 8px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .day-sep { align-self: center; font-size: 11px; color: var(--ink-faint); font-weight: 500; margin: 2px 0 4px; }
  .msg { display: flex; flex-direction: column; max-width: min(74%, 600px); gap: 4px; animation: rise 0.4s cubic-bezier(.22,.61,.36,1) both; }
  .msg.in { align-self: flex-start; align-items: flex-start; }
  .msg.out { align-self: flex-end; align-items: flex-end; }
  .bubble {
    padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.5;
    box-shadow: var(--shadow-sm);
  }
  .msg.in .bubble { background: var(--bubble-in); color: var(--bubble-in-ink); border-bottom-left-radius: 6px; }
  .msg.out .bubble {
    background: linear-gradient(165deg, var(--navy-800), var(--navy-850));
    color: #EEF3FB; border-bottom-right-radius: 6px;
  }
  .meta { font-size: 10.5px; color: var(--ink-faint); padding: 0 6px; display: flex; align-items: center; gap: 6px; }
  .meta .sender { font-weight: 600; color: var(--ink-soft); }
  .meta.out { flex-direction: row-reverse; }

  .analyzing {
    align-self: flex-end; max-width: 74%;
    display: flex; align-items: center; gap: 10px;
    background: var(--accent-tint);
    border: 1px solid rgba(15,158,140,0.28);
    color: var(--accent-strong);
    font-size: 12.5px; font-weight: 600;
    padding: 9px 14px; border-radius: 16px; border-bottom-right-radius: 6px;
    animation: rise 0.35s ease both;
  }
  .analyzing svg { width: 14px; height: 14px; flex: 0 0 auto; }
  .dots { display: inline-flex; gap: 3px; margin-left: 1px; }
  .dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); display: inline-block; animation: blink 1.2s infinite ease-in-out; }
  .dots i:nth-child(2) { animation-delay: 0.18s; }
  .dots i:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-2px); } }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .composer {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 13px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .composer input {
    flex: 1 1 auto; border: 1px solid var(--border-strong); border-radius: 999px;
    padding: 11px 16px; font-family: var(--font-sans); font-size: 13.5px; color: var(--ink);
    background: var(--panel-2); outline: none;
  }
  .composer input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); background: #fff; }
  .composer .send {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--navy-850); color: #fff; cursor: pointer;
    display: grid; place-items: center; transition: background 0.15s, transform 0.1s;
  }
  .composer .send:hover { background: var(--navy-700); }
  .composer .send:active { transform: scale(0.94); }
  .composer .send svg { width: 17px; height: 17px; }
  .enc-note { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--ink-faint); padding: 0 18px 11px; background: var(--panel); }
  .enc-note svg { width: 11px; height: 11px; }

  .ghost-btn {
    border: 1px solid var(--border-strong); background: #fff; color: var(--ink-soft);
    font-family: var(--font-sans); font-size: 11.5px; font-weight: 600;
    padding: 6px 11px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s;
  }
  .ghost-btn:hover { background: var(--panel-2); border-color: var(--accent); color: var(--accent-strong); }
  .ghost-btn svg { width: 12px; height: 12px; }
  .ghost-btn:disabled { opacity: 0.45; cursor: default; }
  .ghost-btn:disabled:hover { background: #fff; border-color: var(--border-strong); color: var(--ink-soft); }

  /* ---------- Context (right) ---------- */
  .ctx-empty { padding: 38px 24px; text-align: center; color: var(--ink-faint); }
  .ctx-empty .ic { width: 44px; height: 44px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--border); display: grid; place-items: center; margin: 0 auto 14px; }
  .ctx-empty .ic svg { width: 20px; height: 20px; color: var(--ink-faint); }
  .ctx-empty p { font-size: 12.5px; line-height: 1.55; margin: 0; }

  .ctx-body { padding: 4px 0 0; }
  .ctx-body.refresh { animation: ctxfade 0.5s ease; }
  @keyframes ctxfade { from { opacity: 0.5; } to { opacity: 1; } }

  .ctx-section { padding: 15px 18px; border-bottom: 1px solid var(--border); }
  .ctx-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 10.5px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 11px;
  }
  .ctx-label .cnt {
    margin-left: auto; font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
    color: var(--ink-faint); background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 99px; padding: 1px 7px;
  }
  .ctx-label svg { width: 13px; height: 13px; color: var(--accent-strong); }

  .claim {
    border: 1px solid var(--border); border-radius: 11px; padding: 11px 12px; background: var(--panel-2);
  }
  .claim + .claim { margin-top: 8px; }
  .claim-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .claim-date { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-soft); font-weight: 500; }
  .claim-prov { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 9px; }
  .claim-amts { display: flex; gap: 8px; }
  .amt { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; }
  .amt .al { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-faint); font-weight: 600; }
  .amt .av { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 2px; }
  .amt.owed .av { color: var(--navy-700); }

  .tag-row { display: flex; flex-direction: column; gap: 7px; }
  .tag {
    display: flex; align-items: center; gap: 9px;
    font-size: 12.5px; color: var(--ink); font-weight: 500;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px;
  }
  .tag .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
  .tag .sub { margin-left: auto; font-size: 11px; color: var(--ink-faint); font-family: var(--font-mono); }

  .med {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; background: var(--panel-2);
  }
  .med + .med { margin-top: 8px; }
  .med .rx { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-tint); color: var(--accent-strong); display: grid; place-items: center; font-weight: 700; font-size: 12px; flex: 0 0 auto; font-family: var(--font-mono); }
  .med .mn { font-size: 13px; font-weight: 600; color: var(--ink); }
  .med .ms { font-size: 11px; color: var(--ink-faint); margin-top: 1px; }
  .med .badge-ok { margin-left: auto; font-size: 10.5px; font-weight: 600; color: var(--accent-strong); background: var(--accent-tint); border: 1px solid rgba(15,158,140,0.3); border-radius: 99px; padding: 2px 8px; white-space: nowrap; }

  .ctx-none { font-size: 12px; color: var(--ink-faint); font-style: italic; }

  /* Privacy section */
  .privacy { padding: 16px 18px 20px; }
  .privacy-card {
    border: 1px solid rgba(15,158,140,0.35);
    background: linear-gradient(160deg, var(--accent-tint), #F2FBF9);
    border-radius: 12px; padding: 14px;
  }
  .privacy-badge { display: flex; align-items: center; gap: 10px; }
  .privacy-badge .shield {
    width: 34px; height: 34px; border-radius: 9px; flex: 0 0 auto;
    background: linear-gradient(150deg, var(--accent), var(--accent-strong));
    display: grid; place-items: center; box-shadow: 0 3px 8px var(--accent-ring);
  }
  .privacy-badge .shield svg { width: 18px; height: 18px; color: #fff; }
  .privacy-badge .pb-txt { line-height: 1.25; }
  .privacy-badge .pb-main { font-size: 12.5px; font-weight: 700; color: var(--accent-strong); }
  .privacy-badge .pb-sub { font-size: 10.5px; color: #2C7A6E; }
  .attest { margin-top: 12px; padding-top: 11px; border-top: 1px solid rgba(15,158,140,0.22); display: flex; flex-direction: column; gap: 5px; }
  .attest .ar { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; font-size: 10.5px; }

  /* ---------- Member Records (collapsible, far right) ---------- */

  .cgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

  /* Referenced-now highlight */

  /* ---------- Member Records dock (full-width, collapsible, bottom) ---------- */
  .rec-dock {

  .tee-badge {

  .tee-badge .sh svg { width: 14px; height: 14px; color: #fff; }

  .tee-badge .tb-sub { font-size: 10px; color: #2C7A6E; font-family: var(--font-mono); }

  .dock-body { flex: 1 1 auto; min-height: 0; display: grid; grid-template-columns: 232px minmax(330px,1.7fr) minmax(220px,1fr) minmax(264px,1.25fr); }
  .dock-col { min-height: 0; overflow-y: auto; padding: 15px 16px; border-right: 1px solid var(--border); }
  .dock-col:last-child { border-right: none; }
  .dock-col::-webkit-scrollbar { width: 8px; }
  .dock-col::-webkit-scrollbar-thumb { background: #D9CFC0; border-radius: 99px; border: 2px solid var(--panel); }
  .dock-col .rec-ghead { position: sticky; top: -15px; background: var(--panel); padding: 4px 0 9px; margin: -4px 0 9px; z-index: 1; }
  .dock-attest { margin-top: 16px; padding-top: 13px; border-top: 1px dashed var(--border); }
  .dock-attest .da-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 6px 0; }
  .dock-attest .da-row .k { font-size: 11px; color: var(--ink-soft); font-weight: 500; }
  .dock-attest .da-row .v { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
</style>
